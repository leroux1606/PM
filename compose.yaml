name: pm-mvp

services:
  app:
    build:
      context: .
      dockerfile: Containerfile
    ports:
      # Host 8001 avoids clashing with other dev servers often bound to 8000. Inside the container the app still listens on 8000.
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - pm_data:/data

volumes:
  pm_data:
